<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام طلبات الفعاليات والمبادرات</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  :root{
    --maroon-950:#6d0f2b; --maroon-900:#6d0f2b; --maroon-800:#8A1538; --maroon-700:#a83c5b; --maroon-600:#a83c5b;
    --maroon-100:#f3ecde; --maroon-50:#FBF7EF; --gold:#C8A951; --gold-d:#a8893a; --red:#9e2b2b; --ink:#2b2320; --line:#e4d9c6; --white:#ffffff;
    --font-body:'Sakkal Majalla','Tajawal','Cairo',sans-serif;
    --font-head:'29LT Bukra','Tajawal','Cairo',sans-serif;
    --radius:14px; --shadow:0 1px 3px rgba(43,35,32,.08),0 6px 24px rgba(138,21,56,.08);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{font-family:var(--font-body); font-size:22px; background:var(--maroon-50); color:var(--ink); min-height:100vh;
    background-image: linear-gradient(var(--line) 1px, transparent 1px); background-size: 100% 34px;}
  #app{display:flex; min-height:100vh;}
  #sidebar{width:250px; flex:0 0 250px; background:linear-gradient(180deg,var(--maroon-900),var(--maroon-950)); color:var(--white);
    display:flex; flex-direction:column; position:sticky; top:0; height:100vh;}
  .brand{display:flex; align-items:center; gap:10px; padding:20px 16px; border-bottom:1px solid rgba(255,255,255,.12);}
  .brand img{width:42px;height:42px;object-fit:contain;}
  .brand .logo-placeholder{width:42px;height:42px;border-radius:8px;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;font-size:18px;}
  .brand-name{font-family:var(--font-head);font-weight:800;font-style:italic;font-size:15px;line-height:1.3;}
  .brand-sub{font-size:11px;opacity:.75;margin-top:2px;}
  nav.mainnav{flex:1; padding:14px 10px; display:flex; flex-direction:column; gap:4px; overflow-y:auto;}
  nav.mainnav button{all:unset; cursor:pointer; display:flex; align-items:center; gap:10px; padding:11px 12px; border-radius:8px; font-size:13.5px; color:rgba(255,255,255,.88); transition:background .15s;}
  nav.mainnav button .ic{font-size:17px; width:20px; text-align:center;}
  nav.mainnav button:hover{background:rgba(255,255,255,.08);}
  nav.mainnav button.active{background:var(--gold); color:var(--maroon-950); font-weight:700;}
  .sidebar-foot{padding:14px; font-size:11px; opacity:.85; border-top:1px solid rgba(255,255,255,.12); display:flex; flex-direction:column; gap:8px;}
  .sidebar-foot button{all:unset; cursor:pointer; background:rgba(255,255,255,.12); color:#fff; padding:7px 10px; border-radius:6px; font-size:12px; text-align:center;}
  .sidebar-foot button:hover{background:rgba(255,255,255,.22);}
  #main{flex:1; display:flex; flex-direction:column; min-width:0;}
  header.topbar{background:var(--white); border-bottom:2px solid var(--maroon-800); padding:16px 26px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:5; box-shadow:var(--shadow);}
  header.topbar h1{font-family:var(--font-head); font-style:italic; font-weight:800; color:var(--maroon-800); font-size:21px; margin:0;}
  header.topbar .sub{font-size:12.5px;color:#7a5560;margin-top:3px;}
  .content{padding:24px 26px 60px; flex:1;}
  .card{background:var(--white); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); padding:0 20px 20px; margin-bottom:20px; overflow:hidden;}
  .card h2{font-family:var(--font-body); font-weight:900; color:#fff; background:#12335c; font-size:17px; margin:0 -20px 16px -20px; padding:14px 20px; border-radius:0; display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap; border-bottom:none;}
  .grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(230px,1fr)); gap:14px; margin-bottom:14px;}
  .field{display:flex; flex-direction:column; gap:6px;}
  .field label{font-size:14px; font-weight:700; color:var(--maroon-800);}
  .field .row-inline{display:flex; gap:6px;}
  input,select,textarea{font-family:var(--font-body); font-size:19px; padding:10px 12px; border:1.5px solid var(--line); border-radius:9px; background:#fff; color:var(--ink); width:100%;}
  input:focus,select:focus,textarea:focus{outline:none; border-color:var(--maroon-600); box-shadow:0 0 0 3px rgba(200,169,81,.18);}
  input:disabled, select:disabled{background:#f2eaec; color:#a98d94;}
  input[type=date], input[type=time]{text-align:right; direction:rtl;}
  textarea{resize:vertical; min-height:64px;}
  .btn{all:unset; cursor:pointer; font-family:var(--font-body); font-size:14px; font-weight:700; padding:9px 16px; border-radius:7px; text-align:center; display:inline-flex; align-items:center; gap:6px;}
  .btn-primary{background:var(--maroon-800); color:#fff;}
  .btn-primary:hover{background:var(--maroon-900);}
  .btn-outline{background:#fff; color:var(--maroon-800); border:1.5px solid var(--maroon-800);}
  .btn-outline:hover{background:var(--maroon-100);}
  .btn-lg{padding:14px 22px; font-size:15px;}
  .btn-sm{padding:6px 10px; font-size:12.5px;}
  .icon-btn{all:unset; cursor:pointer; width:30px; height:30px; border-radius:6px; display:inline-flex; align-items:center; justify-content:center; font-size:15px; background:var(--maroon-100); color:var(--maroon-800);}
  .icon-btn:hover{background:var(--maroon-800); color:#fff;}
  .icon-btn.danger:hover{background:#a3263a;}
  .plus-btn{all:unset; cursor:pointer; width:34px; height:34px; border-radius:7px; flex:0 0 auto; background:var(--maroon-800); color:#fff; font-size:18px; font-weight:800; display:flex; align-items:center; justify-content:center;}
  .plus-btn:hover{background:var(--maroon-900);}
  table{width:100%; border-collapse:collapse; font-size:17px; font-family:var(--font-body);}
  thead th{background:var(--maroon-800); color:#fff; padding:12px 13px; text-align:right; font-family:var(--font-body); font-weight:800; font-style:normal; font-size:17px;}
  tbody td{padding:12px 13px; border-bottom:1px solid var(--line); vertical-align:middle; line-height:1.6;}
  tbody tr:hover{background:var(--maroon-50);}
  .actions-cell{display:flex; gap:4px; flex-wrap:wrap;}
  .badge{display:inline-block; padding:3px 9px; border-radius:20px; background:var(--maroon-100); color:var(--maroon-800); font-size:11.5px; font-weight:700;}
  .badge.ok{background:#d9f0dd;color:#1e6b34;}
  .badge.bad{background:#f7d6d6;color:#8f1a1a;}
  .empty-state{text-align:center; padding:40px 10px; color:#946; opacity:.65;}
  .checkbox-list{display:flex; flex-wrap:wrap; gap:10px;}
  .checkbox-chip{display:flex; align-items:center; gap:6px; border:1.5px solid var(--line); border-radius:20px; padding:6px 12px; font-size:13.5px; cursor:pointer;}
  .checkbox-chip input{width:auto;}
  .presenter-chip{display:flex; align-items:center; gap:8px; border:1.6px solid var(--line); border-radius:10px; padding:10px 12px; font-size:15px; cursor:pointer; background:#fff; transition:.15s;}
  .presenter-chip input{width:auto; accent-color:var(--maroon-800);}
  .presenter-chip:has(input:checked){background:var(--maroon-800); border-color:var(--maroon-800); color:#fff; font-weight:800;}
  .presenter-chip:has(input:disabled){opacity:.45;}
  .stat-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:10px;}
  .stat-box{background:#fff; border:1.5px solid var(--maroon-800); border-radius:10px; padding:10px; text-align:center;}
  .stat-box .num{font-size:19px; font-weight:800; font-family:var(--font-head); font-style:italic; color:var(--maroon-800);}
  .stat-box .lbl{font-size:11px; color:#7a5560; margin-top:2px;}
  .tabs{display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; background:var(--maroon-50); padding:8px; border-radius:12px;}
  .tab-btn{all:unset; cursor:pointer; padding:11px 20px; font-size:17px; font-weight:700; color:#8a5a66; border-radius:10px; transition:.15s;}
  .tab-btn:hover{background:var(--maroon-50);}
  .tab-btn.active{color:#fff; background:#1d6fa5; box-shadow:0 0 0 3px rgba(29,111,165,.22), 0 4px 14px rgba(29,111,165,.35);}
  .helper{font-size:11.5px; color:#8a6470; margin-top:2px;}
  .divider{height:1px; background:var(--line); margin:16px 0;}
  .supervisor-info{background:var(--maroon-50); border:1px dashed var(--maroon-100); border-radius:8px; padding:10px; font-size:13px; display:flex; gap:16px; flex-wrap:wrap;}
  .bell-wrap{position:relative;}
  .bell-btn{all:unset; cursor:pointer; width:38px; height:38px; border-radius:50%; background:var(--maroon-100); color:var(--maroon-800); display:flex; align-items:center; justify-content:center; font-size:18px; position:relative;}
  .bell-btn .dot{position:absolute; top:2px; left:2px; width:10px; height:10px; background:var(--red); border-radius:50%; border:2px solid #fff;}
  .bell-pnl{position:absolute; top:46px; left:0; width:320px; max-height:400px; overflow-y:auto; background:#fff; border:1px solid var(--line); border-radius:12px; box-shadow:0 12px 40px rgba(0,0,0,.18); z-index:60; display:none; padding:8px;}
  .bell-pnl.open{display:block;}
  .bell-item{padding:10px 12px; border-bottom:1px solid var(--maroon-50); font-size:13px; line-height:1.6;}
  .bell-item:last-child{border-bottom:none;}
  .card h2.tp-h{background:#1d5e86; color:#fff; border:none; padding:16px 18px; border-radius:var(--radius) var(--radius) 0 0; font-size:20px; margin:-20px -20px 18px -20px; font-family:var(--font-body); font-style:normal;}
  .notif.unread{background:#fdf0e6; border-right-color:var(--gold);}
  .chart-wrap{margin-top:10px; overflow-x:auto;}
  .star{transition:color .1s;}

  /* Login gate */
  .gate-wrap{min-height:100vh; display:flex; align-items:center; justify-content:center; background:linear-gradient(160deg,var(--maroon-900),var(--maroon-950)); padding:20px;}
  .gate-card{background:#fff; border-radius:16px; padding:40px 34px; width:100%; max-width:480px; box-shadow:0 20px 60px rgba(0,0,0,.35); text-align:center;}
  .gate-card h1{font-family:var(--font-head); font-style:italic; color:var(--maroon-800); font-size:22px; margin:6px 0 4px;}
  .gate-card p{color:#7a5560; font-size:13.5px; margin-bottom:24px;}
  .role-options{display:flex; flex-direction:column; gap:12px;}
  .role-btn{all:unset; cursor:pointer; border:2px solid var(--maroon-100); border-radius:12px; padding:16px; display:flex; align-items:center; gap:14px; transition:.15s;}
  .role-btn:hover{border-color:var(--maroon-800); background:var(--maroon-50);}
  .role-btn .ric{font-size:26px;}
  .role-btn .rtxt{text-align:right;}
  .role-btn .rtitle{font-weight:800; color:var(--maroon-800); font-size:15px;}
  .role-btn .rdesc{font-size:12px; color:#8a6470;}

  /* Modal */
  .modal-overlay{position:fixed; inset:0; background:rgba(42,17,22,.55); display:none; align-items:center; justify-content:center; z-index:100; padding:20px; overflow-y:auto;}
  .modal-overlay.open{display:flex;}
  .modal-box{background:#fff; border-radius:12px; width:100%; max-width:460px; padding:22px; box-shadow:0 20px 60px rgba(0,0,0,.3); max-height:90vh; overflow-y:auto;}
  .modal-box h3{margin:0 0 16px; font-family:var(--font-head); font-style:italic; color:var(--maroon-800);}
  .modal-actions{display:flex; justify-content:flex-end; gap:8px; margin-top:18px;}

  .toast{position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--maroon-900); color:#fff; padding:11px 22px; border-radius:24px; font-size:13.5px; box-shadow:var(--shadow); z-index:200; opacity:0; transition:opacity .25s, bottom .25s; pointer-events:none; max-width:90vw; text-align:center;}
  .toast.show{opacity:1; bottom:34px;}

  /* Print reports now open in their own popup window (Duroob-style self-contained document) — see doPrintDoc(). */

  .mob-toggle{display:none;}
  .mob-scrim{display:none;}
  @media (max-width:860px){
    #sidebar{position:fixed; right:0; z-index:50; transform:translateX(100%); transition:transform .2s; box-shadow:0 0 40px rgba(0,0,0,.3);}
    #sidebar.open{transform:translateX(0);}
    .content{padding:14px;}
    header.topbar{padding:12px 14px;}
    header.topbar h1{font-size:17px;}
    .mob-toggle{display:inline-flex; align-items:center; justify-content:center; width:38px; height:38px; border-radius:9px; background:var(--maroon-800); color:#fff; font-size:18px; border:none; cursor:pointer;}
    .mob-scrim.show{display:block; position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:45;}
    .grid{grid-template-columns:1fr !important;}
    table{font-size:13.5px;}
  }
</style>
</head>
<body>
<div id="rootWrap"></div>
<div class="mob-scrim" id="mobScrim"></div>
<div class="toast" id="toast"></div>
<div class="modal-overlay" id="modalOverlay"><div class="modal-box" id="modalBox"></div></div>

<script>
/* ============ Storage & State ============ */
/* Backed by /api/state (Vercel serverless function + Upstash Redis).
   GET  /api/state  -> { value: <state object> | null }
   POST /api/state  -> body: <state object> (stored as-is) */
let state = null;
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }

function defaultState(){
  return {
    orgName:'إدارة الفعاليات', logo:'',
    printHeader:{ line1:'مؤسسة عيد الخيرية', line2:'مركز عيد الثقافي', line3:'قسم البرامج المجتمعية' },
    nextSerial:1,
    fields:[
      {id:uid(), name:'طلب إداري'},{id:uid(), name:'ثقافي إجتماعي صحي'},{id:uid(), name:'البرامج القيمية الترفيهية'},
      {id:uid(), name:'ثقافي تنافسي'},{id:uid(), name:'ثقافي تطوير معرفي'},{id:uid(), name:'البرامج القيمية - المصلى المتنقل'},
      {id:uid(), name:'البرامج القيمية'},{id:uid(), name:'الأنشطة النوعية'},
    ],
    programTypes:[{id:uid(), name:'حملات'},{id:uid(), name:'مدارك'},{id:uid(), name:'مواهب ومسابقات'},{id:uid(), name:'صحبة'}],
    schools:[
      {id:uid(), name:'مدرسة الشمال الابتدائية', level:'ابتدائي', supervisors:[{id:uid(), name:'أ. خالد المري', phone:'55511111', email:'khaled@example.com'}]},
      {id:uid(), name:'مدرسة عبدالله بن زيد آل محمود', level:'إعدادي', supervisors:[{id:uid(), name:'أ. سعد العبدالله', phone:'55522222', email:'saad@example.com'}]},
      {id:uid(), name:'مدرسة اليرموك الإعدادية', level:'إعدادي', supervisors:[{id:uid(), name:'أ. محمد الكواري', phone:'55533333', email:'mohd@example.com'}]},
    ],
    trainers:(function(){ const t1=uid(), t2=uid(); window.__seedTrainerIds=[t1,t2]; return [{id:t1, name:'أ. أحمد النعيمي', phone:'55011122'},{id:t2, name:'أ. فيصل السليطي', phone:'55033344'}]; })(),
    adminRequestsList:[
      {id:uid(), name:'توفير سيارة'},{id:uid(), name:'توفير مندوب لإيصال المدرب'},{id:uid(), name:'حجز مخيم'},
      {id:uid(), name:'حجز استراحة المؤسسة'},{id:uid(), name:'توفير مقر مركز عيد الثقافي'},
    ],
    users:[
      {id:uid(), username:'admin', password:'admin123', role:'admin', trainerId:'', displayName:'مدير النظام', active:true},
      {id:uid(), username:'user', password:'user123', role:'user', trainerId:'', displayName:'مستخدم النظام', active:true},
      {id:uid(), username:'trainer1', password:'trainer123', role:'trainer', trainerId:window.__seedTrainerIds[0], displayName:'أ. أحمد النعيمي', active:true},
      {id:uid(), username:'trainer2', password:'trainer123', role:'trainer', trainerId:window.__seedTrainerIds[1], displayName:'أ. فيصل السليطي', active:true},
    ],
    orders:[], trainerRequests:[], notifications:[], adminNotifications:[], reminderFlags:{}, tasks:[]
  };
}
/* ══════════════════════════════════════════════════════════════════
   ⚠️ تحذير لأي أداة ذكاء اصطناعي أو مطوّر يعدّل هذا الملف ⚠️
   ══════════════════════════════════════════════════════════════════
   هذا الموقع منشور فعليًا (Live) على Vercel، والدالتان أدناه
   (loadState و saveState) متصلتان بخادم حقيقي عبر:  fetch('/api/state')
   وهذا هو ما يجعل البيانات محفوظة ومشتركة بين كل المستخدمين.

   ✘ لا تستبدل fetch('/api/state') بـ window.storage.get/set إطلاقًا
     (window.storage تعمل فقط داخل معاينة claude.ai ولا تعمل على
     الموقع المنشور فعليًا — استخدامها هنا سيوقف الحفظ تمامًا).
   ✘ لا تستخدم localStorage أو sessionStorage كبديل أيضًا
     (بيانات محلية للمتصفح فقط، غير مشتركة بين المستخدمين).
   ✔ إن احتجت تغيير منطق التطبيق (البيانات، الحقول، الواجهة) عدّل
     بحرية في أي مكان آخر من الملف، فقط لا تلمس آلية الحفظ نفسها.
   ══════════════════════════════════════════════════════════════════ */
async function loadState(){
  try{
    const res = await fetch('/api/state', { method:'GET' });
    const data = await res.json();
    if(data && data.value){
      state = data.value; // already a parsed object (Upstash auto-serializes JSON)
      if(!state.printHeader) state.printHeader={line1:'مؤسسة عيد الخيرية',line2:'مركز عيد الثقافي',line3:'قسم البرامج المجتمعية'};
      if(!state.trainerRequests) state.trainerRequests=[];
      if(!state.notifications) state.notifications=[];
      if(!state.adminNotifications) state.adminNotifications=[];
      if(!state.reminderFlags) state.reminderFlags={};
      if(!state.users || !state.users.length){
        state.users=[
          {id:uid(), username:'admin', password:'admin123', role:'admin', trainerId:'', displayName:'مدير النظام', active:true},
          {id:uid(), username:'user', password:'user123', role:'user', trainerId:'', displayName:'مستخدم النظام', active:true},
        ];
      }
      // migrate old single trainerId -> trainerIds array
      state.orders.forEach(o=>{ if(!o.trainerIds){ o.trainerIds = o.trainerId ? [o.trainerId] : []; } if(!o.status){ o.status='active'; } if(o.evaluatedBy===undefined){ o.evaluatedBy=''; } });
      state.trainerRequests.forEach(r=>{ if(!r.trainerId && r.trainerIds && r.trainerIds[0]) r.trainerId=r.trainerIds[0]; });
      state.users.forEach(u=>{ if(u.active===undefined) u.active=true; });
      state.tasks.forEach(t=>{ if(!t.status){ t.status = t.done ? 'مكتملة' : 'لم تبدأ'; } if(!t.priority){ t.priority='متوسطة'; } });
      return;
    }
  }catch(e){ console.error('load error', e); }
  state = defaultState();
  await saveState();
}
let saving=false, pendingSave=false;
async function saveState(){
  if(saving){ pendingSave=true; return; }
  saving=true;
  try{
    await fetch('/api/state', {
      method:'POST',
      headers:{ 'Content-Type':'application/json' },
      body: JSON.stringify(state)
    });
  }catch(e){ console.error('save error', e); }
  saving=false;
  if(pendingSave){ pendingSave=false; saveState(); }
}

/* ============ Roles & Navigation ============ */
const PAGES = [
  {id:'home', label:'الصفحة الرئيسية', icon:'🏠', roles:['admin','user']},
  {id:'order', label:'طلبات الفعاليات والمبادرات', icon:'📋', roles:['admin','user']},
  {id:'admin', label:'الإداريات (اليومية)', icon:'🗓️', roles:['admin','user']},
  {id:'results', label:'النتائج', icon:'🏁', roles:['admin','user']},
  {id:'distributions', label:'التوزيعات', icon:'🗂️', roles:['admin','user']},
  {id:'reports', label:'التقارير', icon:'📄', roles:['admin','user']},
  {id:'stats', label:'الإحصائيات', icon:'📊', roles:['admin','user']},
  {id:'tasks', label:'المهام', icon:'✅', roles:['admin','user']},
  {id:'trainerPortal', label:'بوابة مقدم الفعالية', icon:'🧑‍🏫', roles:['admin','user','trainer']},
  {id:'approvals', label:'الموافقات', icon:'✅', roles:['admin']},
  {id:'settings', label:'الإعدادات والقوائم', icon:'⚙️', roles:['admin']},
];
let currentRole=null;      // 'admin' | 'user' | 'trainer'
let currentUser=null;      // the matched user record from state.users
let currentPage='home';
let orderSubTab='new';
let editingOrderId=null;
let loggedTrainerId=null;
let trainerPortalTab='upcoming';
let tpAutoOpened=false;

function visiblePages(){ return PAGES.filter(p=>p.roles.includes(currentRole)); }

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(window.__toastTimer);
  window.__toastTimer=setTimeout(()=>t.classList.remove('show'),2600);
}

/* ============ Scheduling conflict helpers ============ */
function parseDT(dateStr, timeStr){ if(!dateStr) return null; return new Date(dateStr+'T'+(timeStr||'00:00')+':00'); }
function trainerConflictSingle(trainerId, date, timeFrom, timeTo, excludeOrderId){
  if(!trainerId || !date) return null;
  const newStart = parseDT(date, timeFrom||'00:00'), newEnd = parseDT(date, timeTo||timeFrom||'23:59');
  const bufferMs = 90*60*1000;
  return state.orders.find(o=>{
    if(o.id===excludeOrderId) return false;
    if(!(o.trainerIds||[]).includes(trainerId)) return false;
    if(o.date!==date) return false;
    const exStart = parseDT(o.date, o.timeFrom||'00:00'), exEnd = parseDT(o.date, o.timeTo||o.timeFrom||'23:59');
    const winStart = new Date(exStart.getTime()-bufferMs), winEnd = new Date(exEnd.getTime()+bufferMs);
    return newStart < winEnd && newEnd > winStart;
  }) || null;
}
function anyTrainerConflict(trainerIds, date, timeFrom, timeTo, excludeOrderId){
  for(const tId of (trainerIds||[])){
    const c = trainerConflictSingle(tId, date, timeFrom, timeTo, excludeOrderId);
    if(c) return {trainerId:tId, order:c};
  }
  return null;
}
function schoolSameDay(schoolId, date, excludeOrderId){
  if(!schoolId||!date) return null;
  return state.orders.find(o=> o.id!==excludeOrderId && o.schoolId===schoolId && o.date===date) || null;
}

/* ============ Order Page (طلبات الفعاليات والمبادرات) ============ */
function getWeekBounds(d){
  const dt = new Date(d+'T00:00:00');
  const dow = dt.getDay(); // 0=Sun
  const start = new Date(dt); start.setDate(dt.getDate()-dow);
  const end = new Date(start); end.setDate(start.getDate()+6);
  const fmt=(x)=>x.toISOString().slice(0,10);
  return {start:fmt(start), end:fmt(end)};
}
function renderOrderPage(c){
  const today = todayStr();
  const {start:wkStart, end:wkEnd} = getWeekBounds(today);
  const activeOrders = state.orders.filter(o=>o.status!=='cancelled');
  const thisWeek = activeOrders.filter(o=>o.date>=wkStart && o.date<=wkEnd);
  const evaluatedThisWeek = thisWeek.filter(o=>o.completionStatus);
  const notEvaluatedToDate = activeOrders.filter(o=>o.date && o.date<today && !o.completionStatus);
  c.innerHTML = `
  <div class="tabs">
    <button class="tab-btn ${orderSubTab==='new'?'active':''}" id="tabNew">فعاليات ومبادرات جديدة</button>
    <button class="tab-btn ${orderSubTab==='list'?'active':''}" id="tabList">كل الطلبات</button>
  </div>
  <div id="orderSubContent"></div>
  <div class="stat-grid" style="margin:18px 0;">
    <div class="stat-box"><div class="num">${thisWeek.length}</div><div class="lbl">عدد الفعاليات خلال الأسبوع</div></div>
    <div class="stat-box"><div class="num">${evaluatedThisWeek.length}</div><div class="lbl">فعاليات قُيّمت خلال الأسبوع</div></div>
    <div class="stat-box"><div class="num">${notEvaluatedToDate.length}</div><div class="lbl">فعاليات لم تُقيَّم حتى تاريخه</div></div>
  </div>
  <div class="card">
    <h2>توزيع فعاليات مقدمي المبادرة هذا الأسبوع <span class="helper" style="color:#cfe0f2;">(${wkStart} إلى ${wkEnd} — تتحدث تلقائيًا كل أسبوع)</span></h2>
    <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(200px,1fr));">
      ${state.trainers.map(t=>{
        const list = thisWeek.filter(o=>(o.trainerIds||[]).includes(t.id));
        let hrs=0; list.forEach(o=>{ if(o.timeFrom&&o.timeTo){ const s=parseDT(o.date,o.timeFrom), e=parseDT(o.date,o.timeTo); if(s&&e) hrs+=Math.max(0,(e-s)/3600000); } });
        return `<div class="stat-box"><div style="font-weight:800;color:var(--maroon-800);margin-bottom:6px;">${escapeHtml(t.name)}</div>
          <div class="num">${list.length}</div><div class="lbl">عدد الفعاليات</div>
          <div style="margin-top:6px;font-size:13px;color:#7a5560;">${hrs.toFixed(1)} ساعة</div></div>`;
      }).join('') || `<div class="empty-state">لا يوجد مقدمو فعاليات</div>`}
    </div>
  </div>`;
  document.getElementById('tabNew').onclick=()=>{orderSubTab='new'; editingOrderId=null; render();};
  document.getElementById('tabList').onclick=()=>{orderSubTab='list'; render();};
  const sub = document.getElementById('orderSubContent');
  if(orderSubTab==='list'){
    sub.innerHTML = `<div class="card"><h2>كل طلبات الفعاليات والمبادرات</h2>
      <div class="field" style="margin-bottom:14px;max-width:340px;"><label>🔎 بحث باسم المدرسة</label><input id="ord_schoolSearch" placeholder="اكتب اسم المدرسة..."></div>
      <div id="ord_listResult"></div></div>`;
    function drawFiltered(){
      const q = document.getElementById('ord_schoolSearch').value.trim();
      let list = state.orders.slice().sort((a,b)=>b.serial-a.serial);
      if(q){ list = list.filter(o=>{ const s=state.schools.find(x=>x.id===o.schoolId); return s && s.name.includes(q); }); }
      document.getElementById('ord_listResult').innerHTML = ordersTableHtml(list);
    }
    document.getElementById('ord_schoolSearch').addEventListener('input', drawFiltered);
    drawFiltered();
    return;
  }
  renderOrderForm(sub);
}

function renderOrderForm(sub){
  const editing = editingOrderId ? state.orders.find(o=>o.id===editingOrderId) : null;
  const selectedTrainerIds = editing ? (editing.trainerIds||[]) : [];

  sub.innerHTML = `
  <div class="card">
    <h2>${editing? 'تعديل فعاليات ومبادرات — رقم '+editing.serial : 'فعاليات ومبادرات'}</h2>

    <div class="grid" style="grid-template-columns:minmax(160px,240px) minmax(160px,240px); gap:14px;">
      <div class="field"><label>مجال المبادرة</label>
        <div class="row-inline"><select id="f_field">${state.fields.map(f=>`<option value="${f.id}" ${editing&&editing.fieldId===f.id?'selected':''}>${escapeHtml(f.name)}</option>`).join('')}</select>
        <button class="plus-btn" title="إضافة مجال جديد" onclick="quickAddField()">+</button></div>
      </div>
      <div class="field"><label>مسار المبادرة</label>
        <div class="row-inline"><select id="f_ptype">${state.programTypes.map(p=>`<option value="${p.id}" ${editing&&editing.programTypeId===p.id?'selected':''}>${escapeHtml(p.name)}</option>`).join('')}</select>
        <button class="plus-btn" title="إضافة مسار جديد" onclick="quickAddPType()">+</button></div>
      </div>
    </div>

    <div class="grid" style="grid-template-columns:1fr;">
      <div class="field"><label>عنوان المبادرة</label><input id="f_title" style="font-size:18px; padding:13px 14px;" value="${editing?escapeHtml(editing.title):''}"></div>
    </div>

    <div class="grid" style="grid-template-columns:repeat(3,1fr);">
      <div class="field"><label>تاريخ المبادرة</label><input id="f_date" type="date" value="${editing?editing.date:''}"></div>
      <div class="field"><label>وقت المبادرة من</label><input id="f_timeFrom" type="time" value="${editing?editing.timeFrom:''}"></div>
      <div class="field"><label>وقت المبادرة إلى</label><input id="f_timeTo" type="time" value="${editing?editing.timeTo:''}"></div>
    </div>

    <div class="grid" style="grid-template-columns:1.6fr 1.4fr 0.8fr;">
      <div class="field"><label>مكان المبادرة (${state.schools.length} مدرسة)</label>
        <input id="f_schoolSearch" placeholder="🔎 اكتب للبحث عن المدرسة..." style="margin-bottom:6px;">
        <div class="row-inline"><select id="f_school" size="1">${state.schools.map(s=>`<option value="${s.id}" ${editing&&editing.schoolId===s.id?'selected':''}>${escapeHtml(s.name)} — ${escapeHtml(s.level)}</option>`).join('')}</select>
        <button class="plus-btn" title="إضافة مدرسة" onclick="quickAddSchool()">+</button></div>
      </div>
      <div class="field"><label>المشرف</label>
        <div class="row-inline"><select id="f_supervisor"></select>
        <button class="plus-btn" title="إضافة مشرف لهذه المدرسة" onclick="quickAddSupervisor()">+</button></div>
      </div>
      <div class="field"><label>عدد المستهدفين</label><input id="f_count" type="number" min="0" value="${editing?editing.participantsCount:''}"></div>
    </div>

    <div id="supervisorInfo" class="supervisor-info" style="margin-bottom:14px;"></div>

    <div class="field" style="margin-bottom:14px;">
      <label style="display:flex;justify-content:space-between;align-items:center;">
        <span>مقدم المبادرة</span>
        <button class="plus-btn" style="width:28px;height:28px;font-size:15px;" title="إضافة مقدم مبادرة" onclick="quickAddTrainer()">+</button>
      </label>
      <div id="trainerChipList" style="display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:8px;"></div>
      <div class="helper">مقدّمو المبادرة المشغولون بفارق أقل من ساعة ونصف عن فعالية أخرى في نفس اليوم يظهرون كـ"مشغول" ولا يمكن اختيارهم.</div>
    </div>

    <div class="divider"></div>
    <div class="grid">
      <div class="field"><label>ملاحظة الجهة الطالبة</label><textarea id="f_reqNote">${editing?escapeHtml(editing.requesterNote||''):''}</textarea></div>
      <div class="field"><label>ملاحظة الإدارة</label><textarea id="f_adminNote">${editing?escapeHtml(editing.adminNote||''):''}</textarea></div>
    </div>
    <div class="divider"></div>
    <div class="field">
      <label style="display:flex;justify-content:space-between;align-items:center;">
        <span>الطلبات الإدارية للبرنامج</span>
        <button class="plus-btn" style="width:28px;height:28px;font-size:15px;" title="إضافة طلب إداري" onclick="quickAddAdminRequest()">+</button>
      </label>
      <div class="checkbox-list" id="adminReqList"></div>
      <div class="helper">إذا كان الطلب مستخدمًا مسبقًا لبرنامج آخر في نفس التاريخ سيظهر تنبيه بذلك.</div>
    </div>
    <div class="divider"></div>
    <div style="display:flex; gap:10px; flex-wrap:wrap;">
      <button class="btn btn-primary" id="saveOrderBtn">${editing?'حفظ التعديلات':'حفظ الطلب'}</button>
      ${editing?'<button class="btn btn-outline" id="cancelEditBtn">إلغاء التعديل</button>':''}
    </div>
  </div>`;

  function currentDate(){ return document.getElementById('f_date').value; }
  function currentTimeFrom(){ return document.getElementById('f_timeFrom').value; }
  function currentTimeTo(){ return document.getElementById('f_timeTo').value; }

  function refreshTrainerChips(){
    const date = currentDate(), tf=currentTimeFrom(), tt=currentTimeTo();
    const box = document.getElementById('trainerChipList');
    const previouslyChecked = Array.from(box.querySelectorAll('input:checked')).map(i=>i.value);
    const checkedSet = new Set(previouslyChecked.length ? previouslyChecked : selectedTrainerIds);
    box.innerHTML = state.trainers.map(t=>{
      const conflict = date ? trainerConflictSingle(t.id, date, tf, tt, editing?editing.id:null) : null;
      const busy = !!conflict && !checkedSet.has(t.id);
      const checked = checkedSet.has(t.id);
      return `<label class="presenter-chip">
        <input type="checkbox" value="${t.id}" ${checked?'checked':''} ${busy?'disabled':''}> ${escapeHtml(t.name)}${busy?' (مشغول)':''}
      </label>`;
    }).join('') || '<span class="helper">لا يوجد مقدمو مبادرات بعد</span>';
  }
  function refreshSupervisors(){
    const schId = document.getElementById('f_school').value;
    const sch = state.schools.find(s=>s.id===schId);
    const sel = document.getElementById('f_supervisor');
    sel.innerHTML = (sch?sch.supervisors:[]).map(sv=>`<option value="${sv.id}" ${editing&&editing.supervisorId===sv.id?'selected':''}>${escapeHtml(sv.name)}</option>`).join('') || '<option value="">لا يوجد مشرفين</option>';
    updateSupervisorInfo();
  }
  function updateSupervisorInfo(){
    const schId = document.getElementById('f_school').value;
    const sch = state.schools.find(s=>s.id===schId);
    const svId = document.getElementById('f_supervisor').value;
    const sv = sch? sch.supervisors.find(s=>s.id===svId):null;
    document.getElementById('supervisorInfo').innerHTML = sv ? `<span>📱 ${escapeHtml(sv.phone||'-')}</span><span>✉️ ${escapeHtml(sv.email||'-')}</span><span>🏫 المرحلة: ${escapeHtml(sch.level)}</span>` : `<span>اختر مدرسة ومشرف لعرض بياناته</span>`;
  }
  document.getElementById('f_school').addEventListener('change', refreshSupervisors);
  document.getElementById('f_supervisor').addEventListener('change', updateSupervisorInfo);
  ['f_date','f_timeFrom','f_timeTo'].forEach(id=>document.getElementById(id).addEventListener('change', refreshTrainerChips));
  refreshSupervisors(); refreshTrainerChips();
  document.getElementById('f_schoolSearch').addEventListener('input', (e)=>{
    const q = e.target.value.trim();
    const sel = document.getElementById('f_school');
    Array.from(sel.options).forEach(opt=>{ opt.style.display = (!q || opt.textContent.includes(q)) ? '' : 'none'; });
  });

  const reqBox = document.getElementById('adminReqList');
  function renderReqChips(){
    reqBox.innerHTML = state.adminRequestsList.map(r=>{
      const checked = editing && editing.adminRequests && editing.adminRequests.includes(r.id) ? 'checked':'';
      return `<label class="checkbox-chip"><input type="checkbox" value="${r.id}" ${checked}> ${escapeHtml(r.name)}</label>`;
    }).join('') || '<span class="helper">لا توجد طلبات إدارية بعد</span>';
    reqBox.querySelectorAll('input[type=checkbox]').forEach(cb=>{
      cb.addEventListener('change', ()=>{
        if(!cb.checked) return;
        const date = currentDate(); if(!date) return;
        const conflictOrder = state.orders.find(o=> (!editing || o.id!==editing.id) && o.date===date && (o.adminRequests||[]).includes(cb.value));
        if(conflictOrder){
          const ok = confirm(`تنبيه: هذا الطلب الإداري "${state.adminRequestsList.find(r=>r.id===cb.value)?.name||''}" مطلوب مسبقًا لبرنامج آخر (${conflictOrder.title}) في نفس التاريخ. قد يكون هناك تداخل. هل تريد المواصلة؟`);
          if(!ok){ cb.checked=false; }
        }
      });
    });
  }
  renderReqChips();

  if(editing) document.getElementById('cancelEditBtn').onclick=()=>{editingOrderId=null; render();};

  document.getElementById('saveOrderBtn').onclick=async ()=>{
    const title=document.getElementById('f_title').value.trim();
    if(!title){ toast('يرجى إدخال عنوان المبادرة'); return; }
    const date=document.getElementById('f_date').value, timeFrom=document.getElementById('f_timeFrom').value, timeTo=document.getElementById('f_timeTo').value;
    const schoolId=document.getElementById('f_school').value;
    const trainerIds = Array.from(document.getElementById('trainerChipList').querySelectorAll('input:checked')).map(i=>i.value);

    if(trainerIds.length && date){
      const conflict = anyTrainerConflict(trainerIds, date, timeFrom, timeTo, editing?editing.id:null);
      if(conflict){ toast('لا يمكن اختيار أحد مقدمي المبادرة: لديه فعالية أخرى في نفس اليوم ولم يمر ساعة ونصف على وقتها.'); return; }
    }
    if(schoolId && date){
      const schConf = schoolSameDay(schoolId, date, editing?editing.id:null);
      if(schConf){
        const ok = confirm(`تنبيه: توجد فعالية أخرى مجدولة في نفس المدرسة بنفس التاريخ (رقم ${schConf.serial} - ${schConf.title}). هل ترغب بالمتابعة؟`);
        if(!ok) return;
      }
    }
    const checkedReqs = Array.from(reqBox.querySelectorAll('input:checked')).map(i=>i.value);
    const orderData = {
      title, fieldId: document.getElementById('f_field').value, participantsCount: document.getElementById('f_count').value,
      date, timeFrom, timeTo, programTypeId: document.getElementById('f_ptype').value,
      schoolId, supervisorId: document.getElementById('f_supervisor').value, trainerIds,
      requesterNote: document.getElementById('f_reqNote').value, adminNote: document.getElementById('f_adminNote').value,
      adminRequests: checkedReqs,
    };
    if(editing){ Object.assign(editing, orderData); }
    else {
      orderData.id = uid(); orderData.serial = state.nextSerial++; orderData.createdAt = Date.now();
      orderData.completionStatus=''; orderData.notDoneReason=''; orderData.supervisorRating=0; orderData.schoolRating=0; orderData.studentsRating=0; orderData.recommendSchool=''; orderData.evaluatedBy=''; orderData.status='active';
      state.orders.push(orderData);
    }
    await saveState();
    toast(editing?'تم حفظ التعديلات':'تم حفظ الطلب');
    editingOrderId=null; orderSubTab='list'; render();
  };
}

function editOrder(id){ editingOrderId=id; orderSubTab='new'; currentPage='order'; render(); }
async function deleteOrder(id){
  if(!confirm('هل تريد حذف هذا الطلب؟')) return;
  state.orders = state.orders.filter(o=>o.id!==id);
  await saveState(); toast('تم الحذف'); render();
}
async function toggleCancelOrder(id){
  const o = state.orders.find(x=>x.id===id); if(!o) return;
  if(o.status==='cancelled'){
    if(!confirm('هل تريد التراجع عن إلغاء هذه الفعالية؟')) return;
    o.status='active'; await saveState(); toast('تم التراجع عن الإلغاء'); render(); return;
  }
  if(!confirm('هل تريد إلغاء هذه الفعالية؟ ستبقى مسجلة لكن بحالة "ملغاة".')) return;
  o.status='cancelled'; await saveState(); toast('تم إلغاء الفعالية'); render();
}
function openPostponeModal(id){
  const o = state.orders.find(x=>x.id===id); if(!o) return;
  openModal('ترحيل / تأجيل: '+o.title, [
    {name:'date', label:'التاريخ الجديد', type:'date', required:true},
    {name:'timeFrom', label:'من الساعة', type:'time'},
    {name:'timeTo', label:'إلى الساعة', type:'time'},
  ], async v=>{
    const oldDate=o.date, oldFrom=o.timeFrom, oldTo=o.timeTo;
    o.date=v.date; if(v.timeFrom) o.timeFrom=v.timeFrom; if(v.timeTo) o.timeTo=v.timeTo;
    o.status='postponed';
    o.adminNote = (o.adminNote?o.adminNote+' | ':'') + `تم ترحيلها من ${oldDate} (${oldFrom||''}-${oldTo||''}) إلى ${o.date} (${o.timeFrom||''}-${o.timeTo||''})`;
    await saveState(); toast('تم ترحيل الفعالية'); render();
  });
  setTimeout(()=>{ const f=document.getElementById('mf_date'); if(f) f.value=o.date; const tf=document.getElementById('mf_timeFrom'); if(tf) tf.value=o.timeFrom||''; const tt=document.getElementById('mf_timeTo'); if(tt) tt.value=o.timeTo||''; },0);
}

/* ============ Evaluation modal ============ */
function openEvaluationModal(orderId){
  const o = state.orders.find(x=>x.id===orderId); if(!o) return;
  const overlay=document.getElementById('modalOverlay'); const box=document.getElementById('modalBox');
  const evalByLabel = o.evaluatedBy==='trainer' ? '🧑‍🏫 تم إدخال هذا التقييم من قبل مقدم الفعالية'
    : o.evaluatedBy==='admin' ? '🛡️ تم إدخال هذا التقييم من الإدارة' : '';
  box.innerHTML = `
    <h3>تقييم وإنجاز: ${escapeHtml(o.title)}</h3>
    ${evalByLabel?`<div class="helper" style="background:var(--maroon-50);padding:8px 10px;border-radius:6px;margin-bottom:12px;font-weight:700;">${evalByLabel}</div>`:''}
    <div class="field" style="margin-bottom:12px;"><label>حالة الإنجاز</label>
      <select id="ev_status"><option value="">-- اختر --</option>
        <option value="تم" ${o.completionStatus==='تم'?'selected':''}>تم الإنجاز</option>
        <option value="لم يتم" ${o.completionStatus==='لم يتم'?'selected':''}>لم يتم الإنجاز</option>
      </select>
    </div>
    <div class="field" id="ev_reasonWrap" style="display:${o.completionStatus==='لم يتم'?'flex':'none'};margin-bottom:12px;">
      <label>سبب عدم الإنجاز</label><textarea id="ev_reason">${escapeHtml(o.notDoneReason||'')}</textarea>
    </div>
    <div class="field" style="margin-bottom:12px;"><label>تقييم مشرف المدرسة (0-10)</label>${starRatingHtml('ev_sup', o.supervisorRating)}</div>
    <div class="field" style="margin-bottom:12px;"><label>تقييم المدرسة (0-10)</label>${starRatingHtml('ev_sch', o.schoolRating)}</div>
    <div class="field" style="margin-bottom:12px;"><label>تقييم تفاعل الطلاب (0-10)</label>${starRatingHtml('ev_stu', o.studentsRating)}</div>
    <div class="field" style="margin-bottom:6px;"><label>هل ترشح المدرسة لفعاليات قادمة؟</label>
      <select id="ev_recommend"><option value="">-- اختر --</option>
        <option value="نعم" ${o.recommendSchool==='نعم'?'selected':''}>نعم</option>
        <option value="لا" ${o.recommendSchool==='لا'?'selected':''}>لا</option>
      </select>
    </div>
    <div class="modal-actions"><button class="btn btn-outline" id="ev_cancel">إلغاء</button><button class="btn btn-primary" id="ev_save">حفظ التقييم</button></div>`;
  overlay.classList.add('open'); wireStars(box);
  document.getElementById('ev_status').onchange=(e)=>{ document.getElementById('ev_reasonWrap').style.display = e.target.value==='لم يتم' ? 'flex':'none'; };
  document.getElementById('ev_cancel').onclick=()=>overlay.classList.remove('open');
  document.getElementById('ev_save').onclick=async ()=>{
    o.completionStatus = document.getElementById('ev_status').value;
    o.notDoneReason = document.getElementById('ev_reason').value;
    o.supervisorRating = Number(document.getElementById('ev_sup_val').value)||0;
    o.schoolRating = Number(document.getElementById('ev_sch_val').value)||0;
    o.studentsRating = Number(document.getElementById('ev_stu_val').value)||0;
    o.recommendSchool = document.getElementById('ev_recommend').value;
    o.evaluatedBy = currentRole==='trainer' ? 'trainer' : 'admin';
    o.evaluatedAt = Date.now();
    if(currentRole==='trainer'){
      const tName = escapeHtml(trainerNames(o) || (state.trainers.find(t=>t.id===loggedTrainerId)||{}).name || '');
      state.adminNotifications.push({id:uid(), message:`قام مقدم الفعالية ${tName} بتقييم فعالية "${o.title}" (أمر رقم ${o.serial}) — حالة الإنجاز: ${o.completionStatus||'لم تنجز'}.`, read:false, createdAt:Date.now()});
    }
    await saveState(); overlay.classList.remove('open'); toast('تم حفظ التقييم'); render();
  };
}

/* quick-add helpers */
function quickAddUser(){
  openModal('إضافة مستخدم جديد', [
    {name:'displayName', label:'الاسم الظاهر', required:true},
    {name:'username', label:'اسم المستخدم', required:true},
    {name:'password', label:'كلمة المرور', required:true},
    {name:'role', label:'الدور', type:'select', options:[
      {value:'admin', label:'مدير نظام'},{value:'user', label:'مستخدم'},{value:'trainer', label:'مقدم فعالية'}]},
    {name:'trainerId', label:'ربط بمقدم فعالية (فقط إن كان الدور مقدم فعالية)', type:'select', options:[{value:'', label:'— بدون —'}, ...state.trainers.map(t=>({value:t.id, label:t.name}))]},
  ], async v=>{
    if(state.users.some(u=>u.username===v.username)){ toast('اسم المستخدم مستخدم بالفعل'); return; }
    state.users.push({id:uid(), username:v.username, password:v.password, role:v.role, trainerId:v.role==='trainer'?v.trainerId:'', displayName:v.displayName, active:true});
    await saveState(); toast('تم إضافة المستخدم'); render();
  });
}
function editUser(id){
  const u = state.users.find(x=>x.id===id); if(!u) return;

/* ============ Print system (Duroob-style: self-contained popup document) ============ */
const PRINT_THEME = '#8A1538';
function doPrintDoc(htmlStr, landscape, pageSize){
  pageSize = pageSize || 'A4';
  const pCSS = '@page{size:'+pageSize+' '+(landscape?'landscape':'portrait')+';margin:10mm}';
  const full = htmlStr.replace('</head>', '<style>'+pCSS+'@media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact}}</style></head>');
  const blob = new Blob([full], {type:'text/html;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const w = window.open(url, '_blank');
  if(!w){ toast('يرجى السماح بالنوافذ المنبثقة في المتصفح ثم إعادة المحاولة'); return; }
  w.addEventListener('load', function(){ w.focus(); w.print(); setTimeout(function(){ URL.revokeObjectURL(url); }, 3000); });
}
function printDocOpen(theme){
  theme = theme || PRINT_THEME;
  return `<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Tajawal',Arial;direction:rtl;background:#f5f7fa;padding:10mm;color:#222;font-size:12pt}
  .doc{max-width:277mm;margin:0 auto;padding:10mm 14mm;border:1.5px solid ${theme};border-radius:4px;background:#fff;box-sizing:border-box}
  .hdr{display:flex;justify-content:space-between;align-items:center;border-bottom:3px solid ${theme};padding-bottom:5mm;margin-bottom:5mm;direction:ltr}
  .org-right{text-align:right;direction:rtl;line-height:1.7}
  .org-l1{font-size:15pt;font-weight:900;color:${theme}}
  .org-l2,.org-l3{font-size:10pt;color:#555;font-weight:700}
  .logo-ph{font-size:34px}
  .title-blk{text-align:center;margin-bottom:6mm;border:2px solid ${theme};border-radius:8px;padding:5mm;background:${theme}0d}

  .title-sub{font-size:10.5pt;color:#555;margin-top:2mm;font-weight:700}

  .kpi-l{font-size:9.5pt;color:#666;margin-top:2px}
  .sec-t{font-size:14pt;font-weight:900;margin:6mm 0 3mm;border-right:5px solid ${theme};padding-right:8px;color:${theme}}

  @media print{body{background:#fff;padding:0}.doc{margin:0;border:none}}
  </style></head><body><div class="doc">`;

/* ---- single-document (order) print: field-row style ---- */
function buildOrderPrintDoc(o, opts, copyLabel){
  opts = opts||{};
  const field = state.fields.find(f=>f.id===o.fieldId);
  const school = state.schools.find(s=>s.id===o.schoolId);
  const supervisor = school ? school.supervisors.find(s=>s.id===o.supervisorId) : null;
  const ptype = state.programTypes.find(p=>p.id===o.programTypeId);
  const reqs = (o.adminRequests||[]).map(id=>{ const r=state.adminRequestsList.find(x=>x.id===id); return r?r.name:''; }).filter(Boolean);
  let rows = [
    ['عنوان المبادرة', o.title||''],
    ['مجال المبادرة', field?field.name:''],
    ['مسار المبادرة', ptype?ptype.name:''],
    ['عدد المستهدفين', o.participantsCount||''],
    ['تاريخ المبادرة', o.date||''],
    ['وقت المبادرة', (o.timeFrom||'')+' — '+(o.timeTo||'')],
    ['مكان المبادرة', school?(school.name+' ('+school.level+')'):''],
    ['المشرف', supervisor?(supervisor.name+' — '+(supervisor.phone||'')+' — '+(supervisor.email||'')):''],
    ['مقدم المبادرة', trainerNames(o)||''],
  ];
  if(opts.showRequesterNote!==false) rows.push(['ملاحظة الجهة الطالبة', o.requesterNote||'']);
  if(opts.showAdminNote!==false){
    rows.push(['ملاحظة الإدارة', o.adminNote||'']);
    rows.push(['الطلبات الإدارية', reqs.join('، ')||'—']);
  }
  let html = printDocOpen(PRINT_THEME);
  html += printDocHeaderBlock();
  html += `<div style="text-align:center;margin-bottom:6mm;"><div class="title-blk" style="display:inline-block;">
    <div class="title-ar" style="white-space:nowrap;">أمر تكليف رقم ${o.serial} <span style="direction:ltr;display:inline-block;">(No. ${o.serial})</span></div>
  </div></div>`;
  html += rows.map(([label,val])=>`<div class="field-row"><span class="f-ar">${escapeHtml(label)} :</span><span class="f-val">${escapeHtml(val)}</span></div>`).join('');
  html += printDocFooter();
  html += printDocClose();
  return html;
}

/* ---- shared multi-record report doc builder (KPI row + one colored table, Duroob style) ---- */
function buildReportDoc(opts){
  // opts: {titleAr, subtitle, kpis:[{v,l}], headers:[...], rows:[[...]], theme}
  const theme = opts.theme || PRINT_THEME;
  let html = printDocOpen(theme);
  html += printDocHeaderBlock();
  html += `<div class="title-blk"><div class="title-ar">${escapeHtml(opts.titleAr)}</div><div class="title-sub">${escapeHtml(opts.subtitle||'')}</div></div>`;
  if(opts.kpis && opts.kpis.length){
    html += `<div class="kpi-row">${opts.kpis.map(k=>`<div class="kpi"><div class="kpi-v">${escapeHtml(String(k.v))}</div><div class="kpi-l">${escapeHtml(k.l)}</div></div>`).join('')}</div>`;
  }
  if(opts.headers && opts.rows){
    html += `<table><thead><tr>${opts.headers.map(h=>`<th>${escapeHtml(h)}</th>`).join('')}</tr></thead><tbody>`;
    html += opts.rows.length ? opts.rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('') : `<tr><td colspan="${opts.headers.length}" style="text-align:center;color:#999;padding:16px;">لا توجد بيانات</td></tr>`;
    html += `</tbody></table>`;
  }
  if(opts.extraHtml) html += opts.extraHtml;
  html += printDocFooter();
  html += printDocClose();
  return html;
}

      ${reqBreakdownTable(k.reqCounts)}`;
    document.getElementById('adm_results').innerHTML = `<h2>النتائج (${list.length})</h2>` + dailyReportTable(list);

      return [i+1, o.serial, escapeHtml(o.title), o.date||'', (o.timeFrom||'')+'-'+(o.timeTo||''), school?escapeHtml(school.name):'', supervisor?escapeHtml(supervisor.phone||''):'', o.participantsCount||'', escapeHtml(trainerNames(o)), escapeHtml(trainerPhones(o)), reqs||'—'];
    });
    const reqRows = Object.entries(k.reqCounts).map(([id,count])=>{ const r=state.adminRequestsList.find(x=>x.id===id); return `<tr><td>${escapeHtml(r?r.name:id)}</td><td>${count}</td></tr>`; }).join('') || '<tr><td colspan="2" style="text-align:center;color:#999;">لا توجد</td></tr>';

/* ============ Simple SVG bar chart ============ */
function svgBarChart(items){
  const max = Math.max(1, ...items.map(i=>i.value));
  const barH=22, gap=10, maxW=320;
  const height = items.length*(barH+gap);
  const bars = items.map((it,i)=>{
    const w = Math.max(2, Math.round((it.value/max)*maxW));
    const y = i*(barH+gap);
    return `<rect x="0" y="${y}" width="${w}" height="${barH}" rx="4" fill="#7a1230"></rect>
      <text x="${maxW+10}" y="${y+barH*0.72}" font-size="12" fill="#2a1116">${escapeHtml(it.name)} (${it.value})</text>`;
  }).join('');
  return `<div class="chart-wrap"><svg viewBox="0 0 ${maxW+180} ${height+10}" style="width:100%;max-width:560px;height:auto;">${bars}</svg></div>`;
}
const DONUT_COLORS = ['#8A1538','#C8A951','#1d5e86','#1e6b34','#a83c5b','#6d0f2b','#8a6470','#c0273f'];
function svgDonutChart(items){
  const total = items.reduce((s,i)=>s+i.value,0) || 1;
  const cx=90, cy=90, r=70, sw=32;
  let angle=-90;
  const circumference = 2*Math.PI*r;
  const arcs = items.map((it,i)=>{
    const frac = it.value/total;
    const dash = frac*circumference;
    const el = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${DONUT_COLORS[i%DONUT_COLORS.length]}" stroke-width="${sw}"
      stroke-dasharray="${dash} ${circumference-dash}" stroke-dashoffset="${-angle/360*circumference}" transform="rotate(-90 ${cx} ${cy})"></circle>`;
    angle += frac*360;
    return el;
  }).join('');
  const legend = items.map((it,i)=>`<div style="display:flex;align-items:center;gap:6px;font-size:12.5px;margin-bottom:4px;">
    <span style="width:12px;height:12px;border-radius:3px;background:${DONUT_COLORS[i%DONUT_COLORS.length]};display:inline-block;"></span>
    ${escapeHtml(it.name)} — ${it.value} (${total?Math.round(it.value/total*100):0}%)</div>`).join('');
  return `<div class="chart-wrap" style="display:flex;gap:20px;flex-wrap:wrap;align-items:center;">
    <svg width="180" height="180" viewBox="0 0 180 180">${arcs}<text x="90" y="96" text-anchor="middle" font-size="18" font-weight="800" fill="#2a1116">${total}</text></svg>
    <div>${legend}</div>
  </div>`;
}

  <div class="card"><h2>قائمة المهام</h2><div id="tk_list"></div></div>`;
  function drawList(){
    const box=document.getElementById('tk_list');
    if(!state.tasks.length){ box.innerHTML=`<div class="empty-state">لا توجد مهام</div>`; return; }
    const today=todayStr();
    box.innerHTML = `<table><thead><tr><th>المهمة</th><th>البدء</th><th>الاستحقاق</th><th>مرتبطة بـ</th><th>الأولوية</th><th>الحالة</th><th>ملاحظات</th><th></th></tr></thead><tbody>
      ${state.tasks.slice().sort((a,b)=>(a.due||'').localeCompare(b.due||'')).map(t=>{
        const trainer=state.trainers.find(x=>x.id===t.trainerId);
        const overdue = t.due && t.due<today && t.status!=='مكتملة';
        const prioBadge = t.priority==='عالية'?'<span class="badge bad">عالية</span>':t.priority==='منخفضة'?'<span class="badge">منخفضة</span>':'<span class="badge busy">متوسطة</span>';
        const statusBadge = t.status==='مكتملة'?'<span class="badge ok">مكتملة</span>':t.status==='قيد التنفيذ'?'<span class="badge busy">قيد التنفيذ</span>':'<span class="badge">لم تبدأ</span>';
        return `<tr style="${overdue?'background:#fdecec;':''}">
        <td>${escapeHtml(t.title)}</td><td>${t.start||'—'}</td><td>${t.due||'—'}${overdue?' ⚠️':''}</td>
        <td>${trainer?escapeHtml(trainer.name):'—'}</td><td>${prioBadge}</td>
        <td><select onchange="updateTaskStatus('${t.id}', this.value)"><option value="لم تبدأ" ${t.status==='لم تبدأ'?'selected':''}>لم تبدأ</option><option value="قيد التنفيذ" ${t.status==='قيد التنفيذ'?'selected':''}>قيد التنفيذ</option><option value="مكتملة" ${t.status==='مكتملة'?'selected':''}>مكتملة</option></select></td>
        <td style="max-width:180px;">${escapeHtml(t.notes||'')}</td>
        <td><button class="icon-btn danger" onclick="deleteTask('${t.id}')">🗑️</button></td></tr>`;
      }).join('')}
    </tbody></table>`;

    const title=document.getElementById('tk_title').value.trim();
    if(!title){ toast('أدخل اسم المهمة'); return; }
    const trainerId = document.getElementById('tk_trainer').value;
    const due = document.getElementById('tk_due').value;
    state.tasks.push({
      id:uid(), title, start:document.getElementById('tk_start').value, due,
      trainerId, priority:document.getElementById('tk_priority').value,
      status:document.getElementById('tk_status').value, notes:document.getElementById('tk_notes').value, done:false

  drawList();

async function updateTaskStatus(id, status){ const t=state.tasks.find(x=>x.id===id); if(t){ t.status=status; t.done=(status==='مكتملة'); await saveState(); render(); } }
async function toggleTask(id){ const t=state.tasks.find(x=>x.id===id); if(t){ t.done=!t.done; t.status=t.done?'مكتملة':'لم تبدأ'; await saveState(); render(); } }
async function deleteTask(id){ state.tasks = state.tasks.filter(x=>x.id!==id); await saveState(); render(); }

/* ============ Distributions Page (التوزيعات) ============ */
function renderDistributionsPage(c){
  const today = todayStr();
  c.innerHTML = `
  <div class="card">
    <h2>توزيع الفعاليات على مقدمي المبادرة</h2>
    <div class="grid">
      <div class="field"><label>الفترة</label><select id="dist_period"><option value="week">أسبوع</option><option value="month">شهر</option><option value="year">سنة</option></select></div>
      <div class="field"><label>تاريخ ضمن الفترة</label><input id="dist_date" type="date" value="${today}"></div>
    </div>
    <button class="btn btn-primary" id="dist_go">عرض</button>
  </div>
  <div id="dist_result" class="grid" style="grid-template-columns:repeat(auto-fit,minmax(280px,1fr));"></div>`;

  function periodBounds(period, dateStr){
    const d = new Date(dateStr+'T00:00:00');
    if(period==='week') return getWeekBounds(dateStr);
    if(period==='month'){
      const start = new Date(d.getFullYear(), d.getMonth(), 1);
      const end = new Date(d.getFullYear(), d.getMonth()+1, 0);
      return {start:start.toISOString().slice(0,10), end:end.toISOString().slice(0,10)};
    }
    const start = new Date(d.getFullYear(),0,1), end = new Date(d.getFullYear(),11,31);
    return {start:start.toISOString().slice(0,10), end:end.toISOString().slice(0,10)};
  }
  function draw(){
    const period=document.getElementById('dist_period').value, dateStr=document.getElementById('dist_date').value || today;
    const {start,end} = periodBounds(period, dateStr);
    const box = document.getElementById('dist_result');
    box.innerHTML = state.trainers.map(t=>{
      const list = state.orders.filter(o=>(o.trainerIds||[]).includes(t.id) && o.date>=start && o.date<=end).sort((a,b)=>(a.date||'').localeCompare(b.date||''));
      return `<div class="card" style="margin-bottom:0;">
        <h2 style="font-size:16px;">${escapeHtml(t.name)} <span class="badge">${list.length}</span></h2>
        ${list.length? list.map(o=>{
          const school=state.schools.find(s=>s.id===o.schoolId);
          return `<div style="border-bottom:1px dashed var(--line); padding:8px 0; font-size:13px; line-height:1.8;">
            <strong>${escapeHtml(o.title)}</strong><br>
            📅 ${o.date||''} — ⏰ ${o.timeFrom||''}-${o.timeTo||''}<br>
            🏫 ${school?escapeHtml(school.name):''} — الإنجاز: ${o.completionStatus||'لم تنجز'}
          </div>`;
        }).join('') : `<div class="empty-state" style="padding:16px;">لا توجد فعاليات ضمن هذه الفترة</div>`}
      </div>`;
    }).join('') || `<div class="empty-state">لا يوجد مقدمو فعاليات</div>`;
  }
  document.getElementById('dist_go').onclick=draw;
  draw();
}

/* ---- reminders & motivational popups for the logged-in trainer ---- */
function daysDiff(from, to){ if(!from||!to) return null; return Math.round((new Date(to+'T00:00:00') - new Date(from+'T00:00:00'))/86400000); }
function isoWeekKey(d){ const dt=new Date(d); const onejan=new Date(dt.getFullYear(),0,1); const week=Math.ceil((((dt-onejan)/86400000)+onejan.getDay()+1)/7); return dt.getFullYear()+'-W'+week; }
async function checkAndShowTrainerPopups(trainer, myOrders){
  if(!trainer) return;
  const today = todayStr();
  const now = new Date();
  let changed=false;
  const flags = state.reminderFlags;

  for(const o of myOrders){
    if(daysDiff(today,o.date)===1){
      const key='dayBefore_'+o.id;
      if(!flags[key]){
        flags[key]=true; changed=true;
        openAnnouncement('🔔 تذكير بفعالية غدًا', `لديك فعالية غدًا "${o.title}" في ${o.date} الساعة ${o.timeFrom||''}. الرجاء التجهيز لها.`);
        break;
      }
    }
  }
  // same-day: 2 hours after the event's end time, if not yet evaluated
  for(const o of myOrders){
    if(o.date===today && o.timeTo && !o.completionStatus){
      const end = parseDT(o.date, o.timeTo);
      if(end && (now - end) >= 2*60*60*1000){
        const key='2hAfter_'+o.id;
        if(!flags[key]){
          flags[key]=true; changed=true;
          openAnnouncement('📝 قيّم الفعالية', `مرّ أكثر من ساعتين على انتهاء فعالية "${o.title}". الرجاء تسجيل الإنجاز والتقييم الآن.`);
          break;
        }
      }
    }
  }
  for(const o of myOrders){
    if(o.date && o.date<today && !o.completionStatus){
      const key='postEvent_'+o.id;
      if(!flags[key]){
        flags[key]=true; changed=true;
        openAnnouncement('📝 حان وقت التقييم', `فعالية "${o.title}" بتاريخ ${o.date} انتهت. الرجاء تسجيل الإنجاز والتقييم الآن.`);
        break;
      }
    }
  }
  // newly assigned tasks
  const myTasksForPopup = state.tasks.filter(t=>t.trainerId===trainer.id);
  for(const t of myTasksForPopup){
    const key='taskAssigned_'+t.id;
    if(!flags[key]){
      flags[key]=true; changed=true;
      openAnnouncement('📋 مهمة جديدة', `تم إسناد مهمة جديدة إليك: "${t.title}"${t.due?(' — الاستحقاق: '+t.due):''}.`);
      break;
    }
  }
  if(now.getDay()===4){
    const wk = isoWeekKey(now);
    const key='motivation_'+trainer.id+'_'+wk;
    if(!flags[key]){
      flags[key]=true; changed=true;
      openAnnouncement('💐 رسالة تحفيزية', 'نشكر لك جهودك المقدمة خلال الاسبوع السابق ونأمل الإطلاع على فعاليات خلال الأسبوع القادم مع التجهيز لها.');
    }
  }
  if(changed) await saveState();
}
function openAnnouncement(title, message){
  const overlay=document.getElementById('modalOverlay'); const box=document.getElementById('modalBox');
  box.innerHTML = `<h3>${escapeHtml(title)}</h3><p style="font-size:15px;line-height:1.8;">${escapeHtml(message)}</p>
    <div class="modal-actions"><button class="btn btn-primary" id="ann_ok">حسنًا</button></div>`;
  overlay.classList.add('open');
  document.getElementById('ann_ok').onclick=()=>overlay.classList.remove('open');
}

      const roleLabel = u.role==='admin'?'مدير نظام':u.role==='user'?'مستخدم':'مقدم فعالية';
      const active = u.active!==false;
      return `<tr><td>${escapeHtml(u.displayName||'')}</td><td>${escapeHtml(u.username)}</td><td>${escapeHtml(u.password)}</td><td>${roleLabel}</td><td>${t?escapeHtml(t.name):'—'}</td>
        <td>${active?'<span class="badge ok">مفعّل</span>':'<span class="badge bad">معطّل</span>'}</td>
        <td class="actions-cell">
          <button class="icon-btn" title="تعديل" onclick="editUser('${u.id}')">✏️</button>
          <button class="icon-btn" title="${active?'تعطيل':'تفعيل'}" onclick="toggleUserActive('${u.id}')">${active?'⏸️':'▶️'}</button>
          <button class="icon-btn danger" title="حذف" onclick="deleteFromList('users','${u.id}')">🗑️</button>
        </td></tr>`;
    }).join('') || `<tr><td colspan="7" class="empty-state">لا يوجد مستخدمون</td></tr>`}
    </tbody></table>
    <div class="helper" style="margin-top:8px;">⚠️ كلمات المرور مخزّنة كنص عادي ضمن بيانات هذا الملف؛ هذا مناسب لتنظيم داخلي بسيط وليس أمانًا حقيقيًا لبيانات حساسة.</div>
  </div>

  <div class="card"><h2>مجالات المبادرة <button class="plus-btn" onclick="quickAddField()">+</button></h2>${simpleListTable(state.fields, 'fields')}</div>
  <div class="card"><h2>مسارات المبادرة <button class="plus-btn" onclick="quickAddPType()">+</button></h2>${simpleListTable(state.programTypes, 'programTypes')}</div>
  <div class="card"><h2>الطلبات الإدارية <button class="plus-btn" onclick="quickAddAdminRequest()">+</button></h2>${simpleListTable(state.adminRequestsList, 'adminRequestsList')}</div>

  <div class="card"><h2>مقدمو الفعاليات
      <span><button class="btn btn-outline btn-sm" onclick="document.getElementById('trainerImportFile').click()">📥 استيراد إكسل</button>
      <input type="file" id="trainerImportFile" accept=".xlsx,.xls,.csv" style="display:none" onchange="importTrainersExcel(this.files[0])">
      <button class="plus-btn" onclick="quickAddTrainer()">+</button></span></h2>
    <div class="helper" style="margin-bottom:8px;">أعمدة الملف المتوقعة: الاسم، الجوال (بهذا الترتيب، مع صف عناوين أول).</div>
    <table><thead><tr><th>الاسم</th><th>الجوال</th><th></th></tr></thead><tbody>
    ${state.trainers.map(t=>`<tr><td>${escapeHtml(t.name)}</td><td>${escapeHtml(t.phone||'')}</td>
      <td class="actions-cell"><button class="icon-btn" title="تعديل" onclick="editTrainer('${t.id}')">✏️</button><button class="icon-btn danger" title="حذف" onclick="deleteFromList('trainers','${t.id}')">🗑️</button></td></tr>`).join('') || `<tr><td colspan="3" class="empty-state">لا يوجد مقدمو فعاليات</td></tr>`}
    </tbody></table>
  </div>

  <div class="card"><h2>المدارس والمشرفون
      <span><button class="btn btn-outline btn-sm" onclick="document.getElementById('schoolImportFile').click()">📥 استيراد إكسل</button>
      <input type="file" id="schoolImportFile" accept=".xlsx,.xls,.csv" style="display:none" onchange="importSchoolsExcel(this.files[0])">
      <button class="plus-btn" onclick="quickAddSchoolSettings()">+</button></span></h2>
    <div class="helper" style="margin-bottom:8px;">أعمدة الملف المتوقعة: اسم المدرسة، المرحلة، اسم المشرف، جوال المشرف، إيميل المشرف (اسم المشرف اختياري — سيُستورد الهاتف/الإيميل حتى لو كان فارغًا).</div>
    ${state.schools.map(s=>`
      <div style="border:1px solid var(--line); border-radius:8px; padding:12px; margin-bottom:12px;">
        <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px;">
          <strong>${escapeHtml(s.name)} <span class="badge">${escapeHtml(s.level)}</span></strong>
          <div><button class="icon-btn" title="تعديل" onclick="editSchool('${s.id}')">✏️</button>
          <button class="icon-btn" title="إضافة مشرف" onclick="quickAddSupervisorSettings('${s.id}')">➕</button>
          <button class="icon-btn danger" title="حذف المدرسة" onclick="deleteFromList('schools','${s.id}')">🗑️</button></div>
        </div>
        <table style="margin-top:8px;"><thead><tr><th>المشرف</th><th>الجوال</th><th>الإيميل</th><th></th></tr></thead><tbody>
        ${s.supervisors.map(sv=>`<tr><td>${escapeHtml(sv.name)}</td><td>${escapeHtml(sv.phone||'')}</td><td>${escapeHtml(sv.email||'')}</td>
          <td><button class="icon-btn danger" onclick="deleteSupervisor('${s.id}','${sv.id}')">🗑️</button></td></tr>`).join('') || `<tr><td colspan="4" class="helper">لا يوجد مشرفون</td></tr>`}
        </tbody></table>
      </div>`).join('') || `<div class="empty-state">لا توجد مدارس</div>`}
  </div>`;

  document.getElementById('set_saveOrg').onclick=async ()=>{
    state.orgName=document.getElementById('set_orgName').value.trim();
    state.printHeader.line1=document.getElementById('set_ph1').value;
    state.printHeader.line2=document.getElementById('set_ph2').value;
    state.printHeader.line3=document.getElementById('set_ph3').value;
    const file=document.getElementById('set_logo').files[0];
    if(file){ state.logo = await fileToDataUrl(file); }
    await saveState(); toast('تم الحفظ'); render();
  };
  document.getElementById('dm_backup').onclick=()=>{
    const blob = new Blob([JSON.stringify(state,null,2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `نسخة_احتياطية_${todayStr()}.json`;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url), 2000);
    toast('تم تنزيل النسخة الاحتياطية');
  };
  document.getElementById('dm_refresh').onclick=async ()=>{
    toast('جارٍ التحديث...');
    await loadState();
    toast('تم تحديث البيانات من الخادم');
    render();
  };
}
async function restoreBackup(file){
  if(!file) return;
  if(!confirm('سيتم استبدال جميع البيانات الحالية بمحتوى ملف النسخة الاحتياطية. هل تريد المتابعة؟')) return;
  try{
    const text = await file.text();
    const parsed = JSON.parse(text);
    if(!parsed || typeof parsed!=='object' || !Array.isArray(parsed.orders)){ toast('ملف النسخة الاحتياطية غير صالح'); return; }
    state = parsed;
    await saveState(); toast('تم استعادة النسخة الاحتياطية'); render();
  }catch(e){ toast('تعذّرت قراءة الملف'); console.error(e); }
}
async function importOrdersExcel(file){
  if(!file) return;
  try{
    const rows = await readExcelFile(file);
    let added=0;
    rows.slice(1).forEach(r=>{
      const title=(r[0]||'').toString().trim(); if(!title) return;
      let date=r[1]; if(date instanceof Date){ date = date.toISOString().slice(0,10); } else { date=(date||'').toString().trim(); }
      const timeFrom=(r[2]||'').toString().trim(), timeTo=(r[3]||'').toString().trim();
      const schoolName=(r[4]||'').toString().trim(); const participantsCount=(r[5]||'').toString().trim();
      let sch = state.schools.find(s=>s.name===schoolName);
      if(!sch && schoolName){ sch={id:uid(), name:schoolName, level:'غير ذلك', supervisors:[]}; state.schools.push(sch); }
      state.orders.push({
        id:uid(), serial: state.nextSerial++, createdAt:Date.now(), title, fieldId: state.fields[0]?state.fields[0].id:'',
        participantsCount, date, timeFrom, timeTo, programTypeId: state.programTypes[0]?state.programTypes[0].id:'',
        schoolId: sch?sch.id:'', supervisorId:'', trainerIds:[], requesterNote:'', adminNote:'مستورد من إكسل',
        adminRequests:[], completionStatus:'', notDoneReason:'', supervisorRating:0, schoolRating:0, studentsRating:0, recommendSchool:'', evaluatedBy:'', status:'active'
      });
      added++;
    });
    await saveState(); toast(`تم استيراد ${added} فعالية`); render();
  }catch(e){ toast('تعذّرت قراءة الملف، تأكد من صيغته'); console.error(e); }
}
function simpleListTable(list, key){
  if(!list.length) return `<div class="empty-state">لا توجد عناصر</div>`;
  return `<table><thead><tr><th>الاسم</th><th></th></tr></thead><tbody>
    ${list.map(i=>`<tr><td>${escapeHtml(i.name)}</td><td class="actions-cell"><button class="icon-btn" title="تعديل" onclick="editListItem('${key}','${i.id}')">✏️</button><button class="icon-btn danger" title="حذف" onclick="deleteFromList('${key}','${i.id}')">🗑️</button></td></tr>`).join('')}
  </tbody></table>`;
}
function editListItem(key, id){
  const item = state[key].find(x=>x.id===id); if(!item) return;
  openModal('تعديل: '+item.name, [{name:'name', label:'الاسم', required:true}], async v=>{
    item.name = v.name; await saveState(); toast('تم الحفظ'); render();
  });
  setTimeout(()=>{ const f=document.getElementById('mf_name'); if(f) f.value=item.name; },0);
}
function editTrainer(id){
  const t = state.trainers.find(x=>x.id===id); if(!t) return;
  openModal('تعديل مقدم مبادرة: '+t.name, [{name:'name', label:'الاسم', required:true},{name:'phone', label:'رقم الجوال'}], async v=>{
    t.name=v.name; t.phone=v.phone; await saveState(); toast('تم الحفظ'); render();
  });
  setTimeout(()=>{ const f=document.getElementById('mf_name'); if(f) f.value=t.name; const p=document.getElementById('mf_phone'); if(p) p.value=t.phone||''; },0);
}
function editSchool(id){
  const s = state.schools.find(x=>x.id===id); if(!s) return;
  openModal('تعديل مدرسة: '+s.name, [
    {name:'name', label:'اسم المدرسة', required:true},
    {name:'level', label:'المرحلة الدراسية', type:'select', options:[
      {value:'ابتدائي',label:'ابتدائي'},{value:'إعدادي',label:'إعدادي'},{value:'ثانوي',label:'ثانوي'},{value:'مركز خاص',label:'مركز خاص'},{value:'غير ذلك',label:'غير ذلك'}]},
  ], async v=>{ s.name=v.name; s.level=v.level; await saveState(); toast('تم الحفظ'); render(); });
  setTimeout(()=>{ const f=document.getElementById('mf_name'); if(f) f.value=s.name; const l=document.getElementById('mf_level'); if(l) l.value=s.level; },0);
}

/* ---- Excel import (SheetJS) ---- */
function readExcelFile(file){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = (e)=>{
      try{
        const wb = XLSX.read(e.target.result, {type:'array'});
        const sheet = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(sheet, {header:1, defval:''});
        resolve(rows);
      }catch(err){ reject(err); }
    };
    reader.onerror = reject;
    reader.readAsArrayBuffer(file);
  });
}
async function importTrainersExcel(file){
  if(!file) return;
  try{
    const rows = await readExcelFile(file);
    let added=0;
    rows.slice(1).forEach(r=>{
      const name=(r[0]||'').toString().trim(); const phone=(r[1]||'').toString().trim();
      if(name){ state.trainers.push({id:uid(), name, phone}); added++; }
    });
    await saveState(); toast(`تم استيراد ${added} مقدم فعالية`); render();
  }catch(e){ toast('تعذّرت قراءة الملف، تأكد من صيغته'); console.error(e); }
}
async function importSchoolsExcel(file){
  if(!file) return;
  try{
    const rows = await readExcelFile(file);
    let added=0, supAdded=0;
    rows.slice(1).forEach(r=>{
      const name=(r[0]||'').toString().trim(); const level=(r[1]||'غير ذلك').toString().trim();
      const svName=(r[2]||'').toString().trim(); const svPhone=(r[3]||'').toString().trim(); const svEmail=(r[4]||'').toString().trim();
      if(!name) return;
      let sch = state.schools.find(s=>s.name===name);
      if(!sch){ sch={id:uid(), name, level, supervisors:[]}; state.schools.push(sch); added++; }
      if(svName || svPhone || svEmail){
        const already = sch.supervisors.some(sv=> (svPhone && sv.phone===svPhone) || (svName && sv.name===svName && !svPhone) );
        if(!already){ sch.supervisors.push({id:uid(), name:svName||'مشرف (بدون اسم)', phone:svPhone, email:svEmail}); supAdded++; }
      }
    });
    await saveState(); toast(`تم استيراد ${added} مدرسة جديدة و ${supAdded} مشرف/رقم هاتف`); render();
  }catch(e){ toast('تعذّرت قراءة الملف، تأكد من صيغته'); console.error(e); }
}
function exportToExcel(filename, headers, rows){
  const ws = XLSX.utils.aoa_to_sheet([headers, ...rows]);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'بيانات');
  XLSX.writeFile(wb, filename);
}
async function deleteFromList(key, id){
  if(!confirm('هل تريد الحذف؟')) return;
  state[key] = state[key].filter(x=>x.id!==id);
  await saveState(); render();
}
async function deleteSupervisor(schoolId, svId){
  if(!confirm('هل تريد حذف المشرف؟')) return;
  const sch=state.schools.find(s=>s.id===schoolId);
  if(sch){ sch.supervisors = sch.supervisors.filter(x=>x.id!==svId); await saveState(); render(); }
}
function quickAddSchoolSettings(){ quickAddSchool(); }
function quickAddSupervisorSettings(schoolId){
  const sch=state.schools.find(s=>s.id===schoolId);
  openModal('إضافة مشرف لمدرسة: '+sch.name, [
    {name:'name', label:'اسم المشرف', required:true},{name:'phone', label:'رقم الجوال'},{name:'email', label:'البريد الإلكتروني'},
  ], async v=>{ sch.supervisors.push({id:uid(), name:v.name, phone:v.phone, email:v.email}); await saveState(); render(); });
}
async function acceptTrainerRequest(id){
  const r = state.trainerRequests.find(x=>x.id===id); if(!r) return;
  r.status='accepted';
  const order = {
    id:uid(), serial: state.nextSerial++, createdAt:Date.now(),
    title:r.title, fieldId: r.fieldId || (state.fields[0]?state.fields[0].id:''), participantsCount:r.participantsCount||'',
    date:r.date, timeFrom:r.timeFrom, timeTo:r.timeTo, programTypeId: r.programTypeId || (state.programTypes[0]?state.programTypes[0].id:''),
    schoolId:r.schoolId, supervisorId:'', trainerIds:[r.trainerId], requesterNote:r.note||'', adminNote:'مضاف من ترشيح مقدم فعالية',
    adminRequests:r.adminRequests||[], completionStatus:'', notDoneReason:'', supervisorRating:0, schoolRating:0, studentsRating:0, recommendSchool:'', evaluatedBy:'', status:'active'
  };
  state.orders.push(order);
  state.notifications.push({id:uid(), trainerId:r.trainerId, message:`تم قبول طلبك: ${r.title} — أضيف إلى برامجك المستقبلية.`, read:false, createdAt:Date.now()});
  await saveState(); toast('تم قبول الطلب وإضافته للبرامج'); render();
}
async function rejectTrainerRequest(id){
  const r = state.trainerRequests.find(x=>x.id===id); if(!r) return;
  r.status='rejected';
  state.notifications.push({id:uid(), trainerId:r.trainerId, message:`تم رفض طلبك: ${r.title}.`, read:false, createdAt:Date.now()});
  await saveState(); toast('تم رفض الطلب'); render();
}

/* ============ Init ============ */
(async function init(){ await loadState(); renderRoot(); })();
</script>
